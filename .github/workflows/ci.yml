name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow uses no untrusted user input — all steps are static bash that
# reads files in the checked-out repo. No github.event.* values are interpolated
# into run: commands.

permissions:
  contents: read

jobs:
  validate:
    name: Validate templates and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install pyyaml shellcheck-py

      - name: Shellcheck observe scripts + bin/matins
        run: |
          for f in templates/observe/*.sh bin/matins; do
            echo "::group::shellcheck $f"
            shellcheck -x "$f" || echo "::warning::$f has shellcheck warnings"
            echo "::endgroup::"
          done

      - name: Smoke-test CLI
        run: |
          bash bin/matins version
          bash bin/matins help | head -1
          for ex in examples/*/MATINS.md; do
            echo "::group::matins lint $ex"
            bash bin/matins lint "$ex"
            echo "::endgroup::"
          done
          bash bin/matins lint MATINS.md
          bash bin/matins lint templates/MATINS.md

      - name: Validate YAML — thresholds example
        run: python -c "import yaml; yaml.safe_load(open('templates/observe/thresholds.example.yaml'))"

      - name: Validate MATINS.md structural sections
        run: |
          required_sections=("## Identity" "## This Week" "## Active Tasks" "## Backlog" "## Blockers" "## Decisions Log" "## Decisions & Constraints" "## Skills & Connectors" "## Last Run" "## Lessons" "## Retro Log" "## History")
          for md in templates/MATINS.md examples/*/MATINS.md; do
            echo "Checking $md..."
            for section in "${required_sections[@]}"; do
              if ! grep -qF "$section" "$md"; then
                echo "::error file=$md::missing section '$section'"
                exit 1
              fi
            done
            echo "  ok"
          done

      - name: Link-check internal references
        run: |
          python - <<'PY'
          import os, re, sys
          broken = []
          for root, _, files in os.walk("."):
              if "/.git/" in root: continue
              for f in files:
                  if not f.endswith(".md"): continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      content = fh.read()
                  for m in re.finditer(r'\[[^\]]+\]\(([^)]+\.md(?:#[^)]*)?)\)', content):
                      target = m.group(1).split("#")[0]
                      if target.startswith(("http://", "https://", "#")): continue
                      if "gaurav18115" in target: continue
                      resolved = os.path.normpath(os.path.join(os.path.dirname(path), target))
                      if not os.path.isfile(resolved):
                          broken.append(f"::error file={path}::broken link to {target}")
          if broken:
              for b in broken: print(b)
              sys.exit(1)
          print("all internal .md links resolve")
          PY
